function mkPanel(i){const d=document.createElement('div');d.className='step-panel';d.id='panel-'+i;return d;}
function markDone(i){const b=document.getElementById('sbtn-'+i);if(b)b.classList.add('done');}
function goStep(i){
  document.querySelectorAll('.step-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+i).classList.add('active');
  document.getElementById('sbtn-'+i).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function speak(text){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;speechSynthesis.cancel();speechSynthesis.speak(u);}
function listenAll(){listenIdx=0;speakNext();}
function speakNext(){
  if(listenIdx>=VOCAB.length)return;
  const u=new SpeechSynthesisUtterance(VOCAB[listenIdx].en);
  u.lang='en-US';u.rate=0.82;
  u.onend=()=>{listenIdx++;setTimeout(speakNext,400);};
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function makeSel(word,pi,bank){
  const shuffled=[...bank].sort(()=>Math.random()-0.5);
  let o='<option value="">—</option>';
  shuffled.forEach(w=>{o+='<option value="'+w+'">'+w+'</option>';});
  return '<select class="pzl-sel" data-ans="'+word+'" data-pi="'+pi+'">'+o+'</select>';
}
function updateFab(){
  let g=0,t=0;
  Object.values(quizScores).forEach(s=>{if(s){g+=s.got;t+=s.total;}});
  Object.values(puzzleScores).forEach(s=>{if(s){g+=s.got;t+=s.total;}});
  document.getElementById('fabScore').textContent=g+'/'+t;
}

function buildStepper(){
  const el=document.getElementById('stepper');
  STEPS.forEach((s,i)=>{
    const btn=document.createElement('button');
    btn.className='step-btn'+(i===0?' active':'');
    btn.id='sbtn-'+i;
    btn.innerHTML='<span class="s-icon">'+s.icon+'</span>'+s.label;
    btn.onclick=()=>goStep(i);
    el.appendChild(btn);
  });
}

function answerQuiz(qKey,qi,oi,ans,convIdx,btn){
  const ck=qKey+'-'+qi;
  if(quizAnswered[ck])return;
  quizAnswered[ck]=true;
  correctMap[ck]=(oi===ans);

  const allOpts=btn.parentElement.querySelectorAll('.quiz-opt');
  allOpts.forEach(b=>b.disabled=true);
  if(oi===ans){
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    allOpts[ans].classList.add('correct');
  }

  const total=CONVS[convIdx].questions.length;
  const allDone=Array.from({length: total}, (_, k) => !!quizAnswered[qKey + '-' + k]).every(Boolean);
  if(allDone){
    let got=0;
    for(let k=0;k<total;k++){if(correctMap[qKey+'-'+k])got++;}
    quizScores[qKey]={got,total};
    updateFab();
    markDone(convIdx+2);
    document.getElementById('qresult-'+convIdx).innerHTML=
      '<div class="quiz-result '+(got===total?'pass':'fail')+'">'+(got===total?'🏆':'💪')+' Результат: '+got+'/'+total+'</div>';
  }
}

function checkPuzzle(pi,pKey){
  const card=document.getElementById('pzl-card-'+pi);
  const sels=card.querySelectorAll('.pzl-sel[data-pi="'+pi+'"]');
  let got=0;
  sels.forEach(sel=>{
    sel.classList.remove('correct','wrong');
    if(sel.value===sel.dataset.ans){sel.classList.add('correct');got++;}
    else sel.classList.add('wrong');
  });
  puzzleScores[pKey]={got,total:sels.length};
  updateFab();
  markDone(6);
  document.getElementById('pzl-score-'+pi).textContent='Результат: '+got+'/'+sels.length;
}

function carNav(id,dir){
  carState[id]=Math.max(0,Math.min(3,carState[id]+dir));
  const idx=carState[id];
  const prefix=id==='r'?'rslide':'spslide';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.getElementById(id+'prev').disabled=idx===0;
  document.getElementById(id+'next').disabled=idx===3;
  document.getElementById(id+'counter').textContent=(idx+1)+' / 4';
  if(id==='r'&&idx===3)markDone(7);
  if(id==='sp'&&idx===3)markDone(9);
}

function flipCard(i){document.getElementById('fc-'+i).classList.toggle('flipped');markDone(8);}
function flipAll(){
  allFlipped=!allFlipped;
  document.querySelectorAll('.fc-card').forEach(c=>c.classList.toggle('flipped',allFlipped));
}

function openResults(){
  let rows='',g=0,t=0;
  for(let i=1;i<=4;i++){const s=quizScores['q'+i];const v=s?s.got+'/'+s.total:'—';if(s){g+=s.got;t+=s.total;}rows+='<tr><td>Quiz '+i+'</td><td>'+v+'</td></tr>';}
  for(let i=1;i<=4;i++){const s=puzzleScores['p'+i];const v=s?s.got+'/'+s.total:'—';if(s){g+=s.got;t+=s.total;}rows+='<tr><td>Puzzle '+i+'</td><td>'+v+'</td></tr>';}
  document.getElementById('resultsBody').innerHTML=rows;
  const pct=t>0?Math.round(g/t*100):0;
  const medal=pct>=90?'🏆':pct>=70?'🌟':pct>=50?'👍':'💪';
  document.getElementById('resultsTotal').textContent=medal+' '+g+'/'+t+' — '+pct+'%';
  let txt='A1-24 Articles\n'+'─'.repeat(28)+'\n';
  for(let i=1;i<=4;i++){const s=quizScores['q'+i];txt+='Quiz '+i+': '+(s?s.got+'/'+s.total:'—')+'\n';}
  for(let i=1;i<=4;i++){const s=puzzleScores['p'+i];txt+='Puzzle '+i+': '+(s?s.got+'/'+s.total:'—')+'\n';}
  txt+='─'.repeat(28)+'\nЗагалом: '+g+'/'+t+' ('+pct+'%) '+medal;
  document.getElementById('resultsText').value=txt;
  document.getElementById('resultsModal').classList.add('open');
}
function closeResults(){document.getElementById('resultsModal').classList.remove('open');}
function copyResults(){
  const ta=document.getElementById('resultsText');ta.select();document.execCommand('copy');
  const btn=document.querySelector('.copy-btn');btn.textContent='✅ Скопійовано!';
  setTimeout(()=>btn.textContent='📋 Скопіювати звіт',2000);
}
